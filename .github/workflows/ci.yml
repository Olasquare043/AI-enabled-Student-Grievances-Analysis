name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: student_grievances
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app -d student_grievances"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://app:app_password@localhost:5432/student_grievances
      JWT_SECRET: ci-jwt-secret
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      LLM_PROVIDER: none
      RATE_LIMIT_ENABLED: "false"
      MONITORING_ENABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: |
          python -m alembic -c alembic.ini upgrade head

      - name: Run backend tests
        working-directory: backend
        run: |
          python -m pytest

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint and typecheck
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck

      - name: Build frontend
        working-directory: frontend
        run: npm run build
